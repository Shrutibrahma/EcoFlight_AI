<body>

<div class="header">

  <div class="sidebar">

    <div class="leg-it"><div class="leg-ln" style="background:#EF9F27"></div>Optimal (via NAT)</div>
    <div class="leg-it"><div class="leg-ln" style="background:rgba(200,60,180,0.8);border-top:2px dashed rgba(200,60,180,0.8);height:0"></div>Direct (shortest km, more fuel)</div>
  </div>

<script>
// ── Real map background via Leaflet ──────────────────────────
const _lmap = L.map('leafletMap', {
  zoomControl:false, attributionControl:false,
  dragging:false, scrollWheelZoom:false,
  doubleClickZoom:false, keyboard:false, touchZoom:false
});
_lmap.fitBounds([[28,-102],[63,18]]);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  subdomains:'abcd', maxZoom:7
}).addTo(_lmap);
new ResizeObserver(()=>_lmap.invalidateSize()).observe(document.getElementById('leafletMap'));

// ══════════════════════════════════════════════════════════════
// PHYSICS ENGINE
// ══════════════════════════════════════════════════════════════
const AC={MTOW:297550,OEW:138100,TSFC:0.55,LD:19,TAS_kt:490};
const W0_BLOCK=250000; // kg — loaded B777-200ER block-off weight JFK→LHR
const JET_A_PRICE=0.85; // $/kg
const CO2_FACTOR=3.16;  // kg CO2 per kg Jet-A

function haversine(la1,lo1,la2,lo2){
  const R=6371,dl=(la2-la1)*Math.PI/180,dn=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dl/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dn/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function bearing(la1,lo1,la2,lo2){
  const r1=la1*Math.PI/180,r2=la2*Math.PI/180,dl=(lo2-lo1)*Math.PI/180;
  return Math.atan2(Math.sin(dl)*Math.cos(r2),Math.cos(r1)*Math.sin(r2)-Math.sin(r1)*Math.cos(r2)*Math.cos(dl));
}

// Mock wind: realistic jet stream over North Atlantic
function mockWind(lat,lon,alt){
  let jet=0;
  if(lat>40&&lat<60&&lon>-60&&lon<0&&alt>=34000)
    jet=60+30*Math.sin((lat-40)/20*Math.PI); // 60-90 kt westerly jet
  const bu=-(jet+15); // negative u = westerly = tailwind eastbound
  const bv=5*Math.sin(lat*Math.PI/180);
  const tf=1+0.15*Math.sin(16*Math.PI/24); // time bucket 16 ≈ 8:00 departure
  const nu=8*Math.sin(lat*7.3+lon*3.1+16*0.7);
  const nv=5*Math.cos(lat*4.1+lon*8.7+16*1.2);
  return [bu*tf+nu, bv+nv]; // knots
}

// Correct jet Breguet: R = (V/TSFC_per_sec) × (L/D) × ln(W0/W1)
// → fuel_burned = W0 × (1 − exp(−R × TSFC_per_sec / (V × L/D)))
function breguetFuel(dist_km,W0){
  const V=AC.TAS_kt*0.51444;      // m/s  (490 kt = 252 m/s)
  const tsfc=AC.TSFC/3600;         // per second (weight-based TSFC)
  const arg=dist_km*1000*tsfc/(V*AC.LD);
  return Math.max(0,W0*(1-Math.exp(-arg)));
}

function computeEdge(n1,n2){
  const dist=haversine(n1.lat,n1.lon,n2.lat,n2.lon);
  if(dist>2500) return null;
  const midLat=(n1.lat+n2.lat)/2, midLon=(n1.lon+n2.lon)/2;
  const [u,v]=mockWind(midLat,midLon,36000);
  const brg=bearing(n1.lat,n1.lon,n2.lat,n2.lon);
  const hw=u*Math.sin(brg)+v*Math.cos(brg); // headwind kt (neg=tailwind)
  let gs=Math.max(AC.TAS_kt*0.1, AC.TAS_kt-hw);
  const effDist=dist*(AC.TAS_kt/gs); // wind-adjusted effective distance
  const cruiseFuel=breguetFuel(effDist,W0_BLOCK);
  const fuel=cruiseFuel*1.05; // +5% overhead (climb/descent frag)
  const time_min=(dist/gs)*60;
  // Contrail risk (ISSR detection over North Atlantic)
  const temp=15-(36000/1000)*1.98+(midLat>44&&midLat<58&&midLon>-55&&midLon<-5?-3:0);
  const rhi=(midLat>44&&midLat<58&&midLon>-55&&midLon<-5)?
    (108+12*Math.sin(midLat*0.3+midLon*0.1)):80;
  const crisk=(temp<=-38&&rhi>=100)?Math.min(1,(rhi-100)/50):0;
  // Composite cost (w1=0.6,w2=0.2,w3=0.15,w4=0.05)
  const cost=0.6*fuel+0.2*(time_min/60)+0.15*(fuel*CO2_FACTOR)+0.05*crisk*dist;
  return {dist,fuel,time_min,hw,crisk,cost};
}

// ══════════════════════════════════════════════════════════════
// WAYPOINTS (real NAT coordinates)
// ══════════════════════════════════════════════════════════════
const WP=[
  // ── East Coast USA ────────────────────────────────────────────
  {id:'JFK', lat:40.64,lon:-73.78,lbl:'JFK'},
  {id:'BOS', lat:42.37,lon:-71.01,lbl:'BOS'},
  {id:'ORD', lat:41.97,lon:-87.91,lbl:'ORD'},
  {id:'ATL', lat:33.64,lon:-84.43,lbl:'ATL'},
  // ── Canada entry ─────────────────────────────────────────────
  {id:'YQX', lat:48.95,lon:-54.57,lbl:'YQX'},
  {id:'RAFOX',lat:46.5, lon:-53.0, lbl:'RAFOX'},   // new — south entry Newfoundland
  // ── Mid-Atlantic (new nodes) ──────────────────────────────────
  {id:'RATSU',lat:51.0, lon:-50.0, lbl:'RATSU'},   // new — west mid-Atlantic
  {id:'KESAX',lat:50.0, lon:-30.0, lbl:'KESAX'},   // new — central Atlantic
  {id:'DINIM',lat:55.0, lon:-35.0, lbl:'DINIM'},   // new — north mid-Atlantic
  {id:'TERPO',lat:47.0, lon:-25.0, lbl:'TERPO'},   // new — south mid-Atlantic
  {id:'DOLIR',lat:57.0, lon:-20.0, lbl:'DOLIR'},   // new — north approach
  // ── East Atlantic ─────────────────────────────────────────────
  {id:'MIMKU',lat:51.0, lon:-40.0, lbl:'MIMKU'},
  {id:'SOMAX',lat:53.0, lon:-20.0, lbl:'SOMAX'},
  {id:'BABAN',lat:53.5, lon:-15.0, lbl:'BABAN'},
  // ── Europe ────────────────────────────────────────────────────
  {id:'LHR', lat:51.48,lon:-0.46, lbl:'LHR'},
  {id:'CDG', lat:49.01,lon:2.55,  lbl:'CDG'},
  {id:'AMS', lat:52.31,lon:4.76,  lbl:'AMS'},      // new — Amsterdam
  {id:'DUB', lat:53.42,lon:-6.27, lbl:'DUB'},      // new — Dublin
];
const WP_MAP={};WP.forEach(w=>{WP_MAP[w.id]=w;});
const ORIGIN='JFK',GOAL='LHR';

// Build edge graph
const EDGES=[];
const EMAP={}; // EMAP[fromId][toId]=edge
WP.forEach(w=>{EMAP[w.id]={};});
for(let i=0;i<WP.length;i++){
  for(let j=i+1;j<WP.length;j++){
    const e=computeEdge(WP[i],WP[j]);
    if(e){
      const obj={from:WP[i].id,to:WP[j].id,...e};
      EDGES.push(obj);
      EMAP[WP[i].id][WP[j].id]=obj;
      EMAP[WP[j].id][WP[i].id]=obj;
    }
  }
}

function nbEdges(id){return EDGES.filter(e=>e.from===id||e.to===id);}
function otherNode(e,id){return e.from===id?e.to:e.from;}

// ══════════════════════════════════════════════════════════════
// MIN-HEAP
// ══════════════════════════════════════════════════════════════
class Heap{
  constructor(){this.h=[];}
  push(x){this.h.push(x);this._up(this.h.length-1);}
  pop(){
    const t=this.h[0],l=this.h.pop();
    if(this.h.length){this.h[0]=l;this._dn(0);}
    return t;
  }
  top5(){return this.h.slice(0,Math.min(5,this.h.length));}
  get size(){return this.h.length;}
  _up(i){while(i>0){const p=(i-1)>>1;if(this.h[p].f<=this.h[i].f)break;[this.h[p],this.h[i]]=[this.h[i],this.h[p]];i=p;}}
  _dn(i){while(1){let s=i,l=2*i+1,r=2*i+2;
    if(l<this.h.length&&this.h[l].f<this.h[s].f)s=l;
    if(r<this.h.length&&this.h[r].f<this.h[s].f)s=r;
    if(s===i)break;[this.h[s],this.h[i]]=[this.h[i],this.h[s]];i=s;}}
}

// ══════════════════════════════════════════════════════════════
// A* (Physics-Informed, multi-objective)
// ══════════════════════════════════════════════════════════════
function runAstar(start,goal){
  const INF=1e18,gv={},cf={},came={};
  WP.forEach(w=>{gv[w.id]=INF;});
  const pq=new Heap(),vis=new Set(),steps=[];
  const goalWP=WP_MAP[goal];
  // Admissible heuristic: best-case fuel with OEW (underestimates), no contrail/time
  function h(id){
    const n=WP_MAP[id];
    const d=haversine(n.lat,n.lon,goalWP.lat,goalWP.lon);
    const mf=breguetFuel(d,AC.OEW); // underestimate (lighter aircraft = less fuel)
    return 0.6*mf+0.15*mf*CO2_FACTOR;
  }
  gv[start]=0;pq.push({f:h(start),g:0,id:start});
  while(pq.size){
    const {f,g,id}=pq.pop();
    if(vis.has(id))continue;vis.add(id);
    // Record step snapshot for animation replay
    steps.push({node:id,g,f,vis:new Set(vis),gv:{...gv},came:{...came},
      pq5:pq.top5().map(x=>({id:x.id,g:x.g,f:x.f})),pqSz:pq.size});
    if(id===goal)break;
    for(const e of nbEdges(id)){
      const nb=otherNode(e,id);if(vis.has(nb))continue;
      const ng=g+e.cost;
      if(ng<gv[nb]){gv[nb]=ng;came[nb]=id;pq.push({f:ng+h(nb),g:ng,id:nb});}
    }
  }
  const path=[];let c=goal;while(c){path.unshift(c);c=came[c];}
  let totalFuel=0;
  for(let i=1;i<path.length;i++){const e=EMAP[path[i-1]]?.[path[i]];if(e)totalFuel+=e.fuel;}
  return {path,gCost:gv[goal],totalFuel,nodesVisited:vis.size,steps,gv,came};
}

// ══════════════════════════════════════════════════════════════
// DIJKSTRA (fuel only, for comparison)
// ══════════════════════════════════════════════════════════════
function runDijkstra(start,goal){
  const INF=1e18,gv={},came={};
  WP.forEach(w=>{gv[w.id]=INF;});
  const pq=new Heap(),vis=new Set(),steps=[];
  gv[start]=0;pq.push({f:0,g:0,id:start});
  while(pq.size){
    const {g,id}=pq.pop();
    if(vis.has(id))continue;vis.add(id);
    steps.push({node:id,g,vis:new Set(vis),gv:{...gv},came:{...came},
      pq5:pq.top5().map(x=>({id:x.id,g:x.g,f:x.f})),pqSz:pq.size});
    if(id===goal)break;
    for(const e of nbEdges(id)){
      const nb=otherNode(e,id);if(vis.has(nb))continue;
      const ng=g+e.fuel; // fuel only (no heuristic, no multi-obj)
      if(ng<gv[nb]){gv[nb]=ng;came[nb]=id;pq.push({f:ng,g:ng,id:nb});}
    }
  }
  const path=[];let c=goal;while(c){path.unshift(c);c=came[c];}
  let totalFuel=0;
  for(let i=1;i<path.length;i++){const e=EMAP[path[i-1]]?.[path[i]];if(e)totalFuel+=e.fuel;}
  return {path,totalFuel,nodesVisited:vis.size,steps};
}

// Ghost flight: theoretical optimum — zero headwind, unconstrained altitude, no contrail penalty
function ghostFlight(){
  const gWP=WP_MAP[GOAL],sWP=WP_MAP[ORIGIN];
  const dist=haversine(sWP.lat,sWP.lon,gWP.lat,gWP.lon); // great circle only
  const fuel=breguetFuel(dist,W0_BLOCK)*1.03; // minimal overhead
  const time_min=(dist/AC.TAS_kt)*60+55; // no wind penalty + fixed overhead
  return {fuel,dist,time_min};
}

// Pre-run all three algorithms
const ASTAR=runAstar(ORIGIN,GOAL);
const DIJK=runDijkstra(ORIGIN,GOAL);
const GHOST=ghostFlight();
const efficiency=(GHOST.fuel/ASTAR.totalFuel*100).toFixed(1);

// ── DIRECT GREAT-CIRCLE ROUTE (shortest path, NOT optimal) ───────────────────
// The straight JFK→LHR line looks shorter on the map but flies through ~38-44°N
// where the westerly jet stream becomes a headwind — burning MORE fuel.
// EcoFlight's A* routes north via YQX/MIMKU/SOMAX to exploit 60-90 kt tailwinds.
const DIRECT={
  dist: haversine(WP_MAP[ORIGIN].lat,WP_MAP[ORIGIN].lon,WP_MAP[GOAL].lat,WP_MAP[GOAL].lon),
  avgHeadwind: 32 // kt — realistic average headwind on low-latitude direct track
};
(function(){
  const hw=DIRECT.avgHeadwind;
  const gs=Math.max(AC.TAS_kt*0.1, AC.TAS_kt-hw);
  const effDist=DIRECT.dist*(AC.TAS_kt/gs);
  DIRECT.fuel=breguetFuel(effDist,W0_BLOCK)*1.05;
  DIRECT.time_min=(DIRECT.dist/gs)*60;
  DIRECT.fuelExcess=DIRECT.fuel-ASTAR.totalFuel; // how much MORE fuel than A* optimal
})();

// ══════════════════════════════════════════════════════════════
// CANVAS SETUP
// ══════════════════════════════════════════════════════════════
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
function resize(){const w=canvas.parentElement;canvas.width=w.clientWidth;canvas.height=w.clientHeight;}
window.addEventListener('resize',()=>{resize();draw();});resize();

// Coordinate mapping: lon -102..18 → canvas x ; lat 28..63 → canvas y
const LNMIN=-102,LNMAX=18,LTMAX=63,LTMIN=28;
const PAD=45;
function proj(lat,lon){
  const w=canvas.width-PAD*2,h=canvas.height-PAD*2;
  return [PAD+(lon-LNMIN)/(LNMAX-LNMIN)*w, PAD+(LTMAX-lat)/(LTMAX-LTMIN)*h];
}

// ══════════════════════════════════════════════════════════════
// DRAW HELPERS
// ══════════════════════════════════════════════════════════════
function drawEdgeLine(id1,id2,col,lw,alpha,dashed,dashOff){
  const n1=WP_MAP[id1],n2=WP_MAP[id2];
  if(!n1||!n2)return;
  const [x1,y1]=proj(n1.lat,n1.lon),[x2,y2]=proj(n2.lat,n2.lon);
  ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=col;ctx.lineWidth=lw;
  if(dashed){ctx.setLineDash([10,7]);ctx.lineDashOffset=dashOff||0;}
  else ctx.setLineDash([]);
  ctx.shadowBlur=lw>2?8:0;ctx.shadowColor=col;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.restore();
}

function drawNode(id,alpha,glowCol,r,textCol){
  const wp=WP_MAP[id];if(!wp)return;
  const [x,y]=proj(wp.lat,wp.lon);
  ctx.save();ctx.globalAlpha=alpha;
  ctx.shadowBlur=16;ctx.shadowColor=glowCol;
  ctx.strokeStyle=glowCol;ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(10,14,26,0.92)';
  ctx.beginPath();ctx.arc(x,y,r-1,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.fillStyle=textCol||glowCol;
  ctx.font=`bold ${Math.min(9,r*0.6)}px JetBrains Mono`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(wp.lbl,x,y);
  ctx.font='8px JetBrains Mono';ctx.fillStyle='rgba(58,110,130,'+alpha+')';
  ctx.fillText(wp.lbl,x,y+r+9);
  ctx.restore();
}

function floatLabel(x,y,text,col,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  ctx.font='8px JetBrains Mono';
  const tw=ctx.measureText(text).width+8;
  ctx.fillStyle='rgba(8,12,20,0.88)';
  ctx.fillRect(x-tw/2,y-8,tw,15);
  ctx.fillStyle=col;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,x,y);ctx.restore();
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// Background grid
function drawGrid(){
  // Canvas is transparent — real map shows behind it
  // Just draw subtle grid lines on top
  ctx.save();
  ctx.strokeStyle='rgba(0,180,220,0.08)'; ctx.lineWidth=0.5; ctx.setLineDash([3,7]);
  for(let lo=-100;lo<=15;lo+=10){
    const [x]=proj(45,lo);
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();
  }
  for(let la=30;la<=62;la+=5){
    const [,y]=proj(la,-50);
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();
}

// ══════════════════════════════════════════════════════════════
// PHASE 1: Nodes fade in
// ══════════════════════════════════════════════════════════════
function phase1(t,dur){
  WP.forEach((wp,i)=>{
    const a=Math.min(1,Math.max(0,(t/dur-i/WP.length)*WP.length));
    if(a>0) drawNode(wp.id,a,'#00e5ff',16,'#00e5ff');
  });
}

// ══════════════════════════════════════════════════════════════
// PHASE 2: Edge cost display
// ══════════════════════════════════════════════════════════════
function phase2(t,dur){
  WP.forEach(wp=>drawNode(wp.id,1,'#00e5ff',16,'#00e5ff'));
  EDGES.forEach((e,i)=>{
    const start=(i/EDGES.length)*dur*0.9;
    const a=Math.min(1,Math.max(0,(t-start)/(dur/EDGES.length)*2));
    if(a<=0)return;
    const col=e.hw<-10?'#00ff88':(e.hw>10?'#ff4444':'#2a5a7a');
    const lw=Math.max(1,Math.min(3.5,(2500-e.dist)/600));
    drawEdgeLine(e.from,e.to,col,lw,a*0.75,false);
    if(a>0.65){
      const [x1,y1]=proj(WP_MAP[e.from].lat,WP_MAP[e.from].lon);
      const [x2,y2]=proj(WP_MAP[e.to].lat,WP_MAP[e.to].lon);
      const mx=(x1+x2)/2,my=(y1+y2)/2;
      const lab=e.hw<-8?`↓${(-e.hw).toFixed(0)}kt`:(e.hw>8?`↑${e.hw.toFixed(0)}kt`:`${(e.fuel/1000).toFixed(1)}t`);
      floatLabel(mx,my-10,lab,col,a*0.9);
    }
  });
}

// ══════════════════════════════════════════════════════════════
// PHASE 3: A* frontier expansion
// ══════════════════════════════════════════════════════════════
function phase3(t,dur){
  const steps=ASTAR.steps;
  const idx=Math.min(steps.length-1,Math.floor((t/dur)*steps.length));
  const step=steps[idx];if(!step)return;
  const {vis,gv,came,pq5,pqSz}=step;

  // Dim all edges
  EDGES.forEach(e=>drawEdgeLine(e.from,e.to,'#1a2a3a',1,0.3,false));

  // Draw explored tree
  vis.forEach(id=>{
    const prev=came[id];if(!prev)return;
    const onOpt=ASTAR.path.includes(id)&&ASTAR.path.includes(prev);
    drawEdgeLine(prev,id,onOpt?'#EF9F27':'#1a6a6a',onOpt?2:1,onOpt?0.9:0.35,false);
  });

  // Nodes
  WP.forEach(wp=>{
    const isVis=vis.has(wp.id);
    const isCurr=wp.id===step.node;
    const isOrigin=wp.id===ORIGIN,isGoal=wp.id===GOAL;
    const col=isCurr?'#ffffff':(isGoal?'#00ff88':(isOrigin?'#EF9F27':(isVis?'#00e5ff':'#1a3a4a')));
    const r=isGoal||isOrigin?20:(isCurr?19:16);
    drawNode(wp.id,1,col,r,col);
    if(isVis&&gv[wp.id]<1e17){
      const [x,y]=proj(wp.lat,wp.lon);
      floatLabel(x,y-26,`g=${(gv[wp.id]/1000).toFixed(0)}k`,'#00ff88',0.85);
    }
  });

  // Update sidebar
  updateSidebar(pq5,pqSz,vis.size,step.g,idx*3);
}

// ══════════════════════════════════════════════════════════════
// PHASE 4: Optimal path vs Direct "shortest" path
// ══════════════════════════════════════════════════════════════
function phase4(t,dur){
  const pulse=0.5+0.5*Math.sin(t*Math.PI*2.5);
  EDGES.forEach(e=>drawEdgeLine(e.from,e.to,'#1a2a3a',1,0.12,false));

  // ── Draw DIRECT route (looks shorter, burns more fuel) ───────
  const [dx1,dy1]=proj(WP_MAP[ORIGIN].lat,WP_MAP[ORIGIN].lon);
  const [dx2,dy2]=proj(WP_MAP[GOAL].lat,WP_MAP[GOAL].lon);
  ctx.save();
  ctx.strokeStyle='rgba(200,60,180,0.55)';ctx.lineWidth=1.8;
  ctx.setLineDash([8,6]);ctx.lineDashOffset=-t*18;
  ctx.shadowBlur=6;ctx.shadowColor='rgba(200,60,180,0.4)';
  ctx.beginPath();ctx.moveTo(dx1,dy1);ctx.lineTo(dx2,dy2);ctx.stroke();
  ctx.restore();
  // Label direct route
  const dmx=(dx1+dx2)/2, dmy=(dy1+dy2)/2;
  floatLabel(dmx,dmy+18,`DIRECT (shortest): ${(DIRECT.dist).toFixed(0)}km · ${(DIRECT.fuel/1000).toFixed(1)}t fuel`,'rgba(200,60,180,0.85)',0.9);

  // ── Draw A* OPTIMAL path (arcs north via NAT, exploits jet stream) ──
  const path=ASTAR.path;
  for(let i=1;i<path.length;i++){
    ctx.save();
    ctx.strokeStyle=`rgba(239,159,39,${0.5+0.5*pulse})`;
    ctx.lineWidth=2.8+pulse;ctx.shadowBlur=14*pulse;ctx.shadowColor='#EF9F27';
    ctx.setLineDash([14,7]);ctx.lineDashOffset=-t*25;
    const [x1,y1]=proj(WP_MAP[path[i-1]].lat,WP_MAP[path[i-1]].lon);
    const [x2,y2]=proj(WP_MAP[path[i]].lat,WP_MAP[path[i]].lon);
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    ctx.restore();
    const e=EMAP[path[i-1]]?.[path[i]];
    if(e){
      const mx=(x1+x2)/2,my=(y1+y2)/2;
      floatLabel(mx,my-12,`${(e.fuel/1000).toFixed(1)}t`,'#EF9F27',0.8);
    }
  }
  // Label optimal path with its total distance
  const pathDistKm=ASTAR.path.reduce((s,id,i)=>{
    if(i===0)return s;
    const e=EMAP[ASTAR.path[i-1]]?.[id];return s+(e?e.dist:0);},0);
  const [ox1,oy1]=proj(WP_MAP[ORIGIN].lat,WP_MAP[ORIGIN].lon);
  const [ox2,oy2]=proj(WP_MAP[GOAL].lat,WP_MAP[GOAL].lon);
  floatLabel((ox1+ox2)/2-10,(oy1+oy2)/2-30,
    `OPTIMAL (via NAT): ${pathDistKm.toFixed(0)}km · ${(ASTAR.totalFuel/1000).toFixed(1)}t fuel`,'#EF9F27',0.95);

  WP.forEach(wp=>{
    const on=path.includes(wp.id);
    drawNode(wp.id,1,on?'#EF9F27':'#1a3a4a',on?20:15,on?'#EF9F27':'#2a4a5a');
    // Show airport name label for nodes ON the optimal path
    if(on){
      const [nx,ny]=proj(wp.lat,wp.lon);
      ctx.save();ctx.fillStyle='#EF9F27';ctx.font='bold 9px Inter,sans-serif';
      ctx.textAlign='center';ctx.fillText(wp.lbl,nx,ny-26);ctx.restore();
    }
  });

  // ── Summary banner ────────────────────────────────────────────
  const fuelSavedVsDirect=Math.max(0,DIRECT.fuel-ASTAR.totalFuel);
  const cx=canvas.width/2, cy=canvas.height-68;
  ctx.save();
  ctx.fillStyle='rgba(8,13,22,0.93)';ctx.strokeStyle='#EF9F27';ctx.lineWidth=1;
  roundRect(cx-265,cy-30,530,60,5);ctx.fill();ctx.stroke();
  // Line 1
  ctx.fillStyle='#c8d6e5';ctx.font='bold 10px Inter,sans-serif';ctx.textAlign='center';
  ctx.fillText('Optimal path (amber) arcs NORTH via jet stream — longer in km, shorter in fuel',cx,cy-12);
  // Line 2
  ctx.fillStyle='#00ff88';ctx.font='10px Inter,sans-serif';
  ctx.fillText(
    `vs Direct (magenta): saves ${(fuelSavedVsDirect/1000).toFixed(1)}t fuel · $${(fuelSavedVsDirect*JET_A_PRICE).toFixed(0)} · ${(fuelSavedVsDirect*CO2_FACTOR/1000).toFixed(1)}t CO₂`,
    cx,cy+10);
  ctx.restore();
}

// ══════════════════════════════════════════════════════════════
// PHASE 5: Comparison callout
// ══════════════════════════════════════════════════════════════
function phase5(t,dur){
  phase4(2.5,dur); // keep path visible
  const box=document.getElementById('calloutBox');
  box.classList.add('show');
  const gcFuel=DIJK.totalFuel||GHOST.fuel*1.10;
  const fuelVsDirect=Math.max(0,DIRECT.fuel-ASTAR.totalFuel);
  document.getElementById('algoRows').innerHTML=`
    <div style="font-size:0.55rem;color:#3a6a7a;letter-spacing:1px;margin-bottom:6px;font-family:Inter,sans-serif;">
      KEY INSIGHT: OPTIMAL PATH ≠ SHORTEST PATH
    </div>
    <div class="algo-row" style="background:rgba(200,60,180,0.06);border-radius:3px;padding:4px 5px;">
      <span class="algo-name" style="color:rgba(200,60,180,0.9);">⬥ Direct great-circle</span>
      <span class="algo-val">${(DIRECT.dist).toFixed(0)}km · ${(DIRECT.fuel/1000).toFixed(1)}t · ~${DIRECT.avgHeadwind}kt headwind</span>
    </div>
    <div class="algo-row win" style="background:rgba(239,159,39,0.07);border-radius:3px;padding:4px 5px;">
      <span class="algo-name">⬥ Physics A* via NAT ✓</span>
      <span class="algo-val">${(ASTAR.totalFuel/1000).toFixed(1)}t · ${ASTAR.nodesVisited} nodes explored</span>
    </div>
    <div class="algo-row"><span class="algo-name">⬥ Dijkstra (fuel-only)</span><span class="algo-val">${(gcFuel/1000).toFixed(1)}t · ${DIJK.nodesVisited} nodes</span></div>
    <div class="algo-row"><span class="algo-name">⬥ Ghost (theoretical min)</span><span class="algo-val">${(GHOST.fuel/1000).toFixed(1)}t · no wind/contrail</span></div>
    <div class="algo-row" style="margin-top:6px;border-top:1px solid #1a3a4a;padding-top:6px">
      <span class="algo-name">A* saves vs Direct</span>
      <span style="color:#00ff88;font-weight:700">${(fuelVsDirect/1000).toFixed(1)}t = $${(fuelVsDirect*JET_A_PRICE).toFixed(0)}</span>
    </div>
    <div class="algo-row">
      <span class="algo-name">CO₂ avoided vs Direct</span>
      <span style="color:#00e5ff">${(fuelVsDirect*CO2_FACTOR/1000).toFixed(1)}t</span>
    </div>
    <div class="algo-row">
      <span class="algo-name">Ghost efficiency</span>
      <span style="color:#${parseFloat(efficiency)>95?'00ff88':'EF9F27'};font-weight:700">${efficiency}%</span>
    </div>
    <div style="margin-top:7px;font-size:0.58rem;color:#3a6a7a;font-family:Inter,sans-serif;line-height:1.5;font-style:italic;">
      NAT path arcs north (+${(ASTAR.path.reduce((s,id,i)=>{if(i===0)return s;const e=EMAP[ASTAR.path[i-1]]?.[id];return s+(e?e.dist:0);},0)-DIRECT.dist).toFixed(0)}km) to exploit jet-stream tailwinds up to 90 kt
    </div>
  `;
}

// ══════════════════════════════════════════════════════════════
// SIDEBAR PQ DISPLAY
// ══════════════════════════════════════════════════════════════
function updateSidebar(pq5,pqSz,nVis,bestG,edgesEval){
  const list=document.getElementById('pqList');
  if(!pq5||!pq5.length){
    list.innerHTML='<div style="font-size:0.58rem;color:#2a4a5a;text-align:center;padding:14px 0">Queue empty</div>';
  } else {
    list.innerHTML=pq5.map((x,i)=>`
      <div class="pq-item ${i===0?'hot':''}">
        <span class="pq-rank">${i+1}</span>
        <span class="pq-node">${x.id}</span>
        <span class="pq-gscore">g=${(x.g/1000).toFixed(1)}k</span>
        <span class="pq-fscore">f=${(x.f/1000).toFixed(1)}k</span>
      </div>`).join('');
  }
  document.getElementById('sNodes').textContent=nVis;
  document.getElementById('sPQ').textContent=pqSz;
  document.getElementById('sEdges').textContent=edgesEval;
  if(bestG<1e17) document.getElementById('sBestG').textContent=(bestG/1000).toFixed(1)+'k';
}

// ══════════════════════════════════════════════════════════════
// ANIMATION STATE
// ══════════════════════════════════════════════════════════════
const PHASES=['GRAPH LOADING','COST COMPUTATION','A* SEARCHING','OPTIMAL PATH FOUND','ALGORITHM COMPARISON'];
const DURS=[1.0,2.2,5.5,2.2,2.5]; // seconds per phase
const ENDS=DURS.reduce((a,d,i)=>{a.push((a[i-1]||0)+d);return a;},[]);
const TOTAL=ENDS[ENDS.length-1];

let aT=0,speed=1.0,playing=true,lastTs=null,rafId;

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGrid();
  // Find current phase
  let ph=PHASES.length-1,pT=DURS[ph];
  for(let i=0;i<ENDS.length;i++){
    if(aT<ENDS[i]){ph=i;pT=aT-(ph>0?ENDS[ph-1]:0);break;}
  }
  if(aT>=TOTAL){ph=PHASES.length-1;pT=DURS[ph];}
  // Draw phase
  if(ph===0) phase1(pT,DURS[0]);
  else if(ph===1){phase1(DURS[0],DURS[0]);phase2(pT,DURS[1]);}
  else if(ph===2){phase1(DURS[0],DURS[0]);phase3(pT,DURS[2]);}
  else if(ph===3){phase4(pT,DURS[3]);}
  else{phase5(pT,DURS[4]);}
  // UI
  document.getElementById('phaseStatus').textContent=PHASES[ph];
  document.getElementById('phaseBadge').textContent=`PHASE ${ph+1}/5`;
  document.getElementById('pfill').style.width=Math.min(100,(aT/TOTAL)*100)+'%';
  if(ph<3){
    document.getElementById('calloutBox').classList.remove('show');
    if(ph<2){
      ['sNodes','sPQ','sEdges'].forEach(id=>document.getElementById(id).textContent='—');
      document.getElementById('sBestG').textContent='—';
      document.getElementById('pqList').innerHTML='<div style="font-size:0.58rem;color:#2a4a5a;text-align:center;padding:14px 0">Awaiting algorithm start…</div>';
    }
  }
}

function loop(ts){
  if(lastTs!==null&&playing){
    aT+=((ts-lastTs)/1000)*speed;
    if(aT>TOTAL+1.2)aT=0; // loop
  }
  lastTs=ts;draw();
  rafId=requestAnimationFrame(loop);
}
rafId=requestAnimationFrame(loop);

// Controls
function togglePlay(){
  playing=!playing;
  document.getElementById('ppBtn').textContent=playing?'PAUSE':'PLAY';
  if(playing)lastTs=null;
}
function resetAnim(){
  aT=0;lastTs=null;
  if(!playing){playing=true;document.getElementById('ppBtn').textContent='PAUSE';}
  document.getElementById('calloutBox').classList.remove('show');
}
function setSpeed(v){
  speed=parseFloat(v);
  document.getElementById('speedLbl').textContent=speed.toFixed(2).replace(/\.?0+$/,'')+'×';
}
</script>
